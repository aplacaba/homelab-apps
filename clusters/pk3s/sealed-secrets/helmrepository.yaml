apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: bitnami
  namespace: flux-system
spec:
  interval: 1h
  # Bitnami migrated charts to OCI on Docker Hub; the legacy HTTP index
  # redirects to oci:// refs that an HTTP-typed repo can't pull.
  type: oci
  url: oci://registry-1.docker.io/bitnamicharts
