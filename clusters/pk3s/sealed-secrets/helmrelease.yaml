apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sealed-secrets
  namespace: sealed-secrets
spec:
  interval: 1h
  chart:
    spec:
      chart: sealed-secrets
      version: "2.5.x"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  # Chart defaults install the controller + cluster-wide RBAC, so it can decrypt
  # SealedSecrets in any namespace (e.g. cloudflared). It runs in this namespace.
