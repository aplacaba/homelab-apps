apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless
  namespace: paperless
spec:
  interval: 1h
  chart:
    spec:
      chart: paperless
      version: "7.0.x"
      sourceRef:
        kind: HelmRepository
        name: pascaliske
        namespace: flux-system
  values:
    image:
      registry: ghcr.io
      repository: paperless-ngx/paperless-ngx

    env:
      - name: TZ
        value: Asia/Manila
      - name: PAPERLESS_DBENGINE
        value: sqlite
      # Trust Authentik's identity from the forward-auth gate. The
      # authentik-forwardauth middleware injects X-authentik-username on every
      # authenticated request (see traefik/middlewares); paperless reads it via
      # Django's normalized request.META key and auto-creates the user. With this
      # on, paperless logs you in straight from Authentik — no paperless login
      # screen. The forward-auth gate (IngressRoute) is still the required entry.
      - name: PAPERLESS_ENABLE_HTTP_REMOTE_USER
        value: "true"
      # Authenticate the API too (paperless's middleware skips /api/ unless this
      # is set). Adds PaperlessRemoteUserAuthentication to DRF and stops the
      # remote-user middleware from skipping API requests. Needed because the
      # Angular UI calls /api/* — without it those return 401/403 even though
      # the frontend page loaded fine.
      - name: PAPERLESS_ENABLE_HTTP_REMOTE_USER_API
        value: "true"
      - name: PAPERLESS_HTTP_REMOTE_USER_HEADER_NAME
        value: HTTP_X_AUTHENTIK_USERNAME
    secret:
      create: true
      values:
        PAPERLESS_ADMIN_USER: admin
        PAPERLESS_ADMIN_PASSWORD: admin
        PAPERLESS_ADMIN_MAIL: admin@paperless.local

    persistentVolumeClaim:
      create: true
      size: 10Gi
      storageClassName: local-path
      accessMode: ReadWriteOnce

    # We manage the IngressRoute ourselves (see ingressroute.yaml) because
    # gating behind Authentik needs two routes, which the chart can't express.
    ingressRoute:
      create: false
      entryPoints:
        - web
      rule: Host(`paperless.local`)

    redis:
      enabled: true
      fullnameOverride: paperless-redis
      persistentVolumeClaim:
        create: true
        size: 1Gi
        storageClassName: local-path

    resources:
      limits:
        cpu: 2000m
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 256Mi
