apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: loki
      version: "6.x"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    loki:
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      ingester:
        chunk_encoding: snappy
      querier:
        max_concurrent: 4
      compactor:
        retention_enabled: true
      retention: 7d

    singleBinary:
      replicas: 1
      persistence:
        storageClass: local-path
        size: 10Gi
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi

    monitoring:
      dashboards:
        enabled: true
      serviceMonitor:
        enabled: true
        labels:
          release: prometheus
      rules:
        enabled: true
        labels:
          release: prometheus
      alerts:
        enabled: true
        labels:
          release: prometheus

    gateway:
      enabled: false

    lokiCanary:
      enabled: false

    test:
      enabled: false

    grafana:
      enabled: false
