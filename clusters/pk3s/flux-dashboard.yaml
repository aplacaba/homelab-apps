apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: flux-dashboard
  namespace: flux-system
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: PathPrefix(`/fluxops`)
      middlewares:
        - name: fluxops-stripprefix
          namespace: flux-system
      services:
        - name: flux-operator
          port: 9080
