apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 1h
  chart:
    spec:
      chart: authentik
      version: "2025.2.x"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
  values:
    # ------------------------------------------------------------------
    # Global settings
    # ------------------------------------------------------------------
    global:
      # Single sign-on domain — used for cookie scoping
      # Change to your actual domain if exposing publicly
      domain: authentik.local

    # ------------------------------------------------------------------
    # Authentik server configuration
    # ------------------------------------------------------------------
    authentik:
      # Secret key for session signing and encryption.
      # Keep this stable across restarts — generate with:
      #   python3 -c "import secrets; print(secrets.token_urlsafe(48))"
      secret_key: "QiB6P1EcUu1Sj5Lc78XHVzngXKMmzoNrRcoJN0qrQ7DSKKN2VtsLMP51f_nV-acz"

      # Fixed key for outpost communication (Traefik forward auth).
      # Must match what you configure in the Authentik UI later.
      fixed_key: "change-this-to-a-random-64-char-string-in-production"

      # Log settings
      log_level: info

      # Disable error reporting
      error_reporting:
        enabled: false

      # Bootstrap admin credentials — CHANGE immediately after first login
      bootstrap_password: "admin123"
      bootstrap_email: "admin@authentik.local"
      bootstrap_token: "bootstrap-token-change-me"

      # Database and cache connection credentials
      postgresql:
        password: "authentik-db-pass"
      redis:
        password: "authentik-redis-pass"

    # ------------------------------------------------------------------
    # Authentik server components
    # ------------------------------------------------------------------
    server:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      service:
        servicePortHttp: 80
        servicePortHttpName: http
      ingress:
        enabled: false

    worker:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi



    # ------------------------------------------------------------------
    # PostgreSQL (built-in subchart)
    # ------------------------------------------------------------------
    postgresql:
      enabled: true
      auth:
        password: "authentik-db-pass"
        database: authentik
        username: authentik
      image:
        tag: latest
      persistence:
        size: 8Gi
        storageClass: local-path
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

    # ------------------------------------------------------------------
    # Redis (built-in subchart)
    # ------------------------------------------------------------------
    redis:
      enabled: true
      auth:
        enabled: true
        password: "authentik-redis-pass"
      image:
        tag: latest
      architecture: standalone
      master:
        persistence:
          size: 1Gi
          storageClass: local-path
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
