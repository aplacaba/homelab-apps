apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  interval: 1h
  chart:
    spec:
      chart: vaultwarden
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: vaultwarden
        namespace: flux-system
  values:
    ingress:
      enabled: false
    fullnameOverride: "vaultwarden"
    domain: https://vault.watchtoken.org
    signupsAllowed: false
    adminToken:
      existingSecret: vaultwarden-admin-token
      existingSecretKey: ADMIN_TOKEN
    storage:
      data:
        name: vaultwarden-data
        size: 1Gi
        class: local-path
        keepPvc: true
        accessMode: ReadWriteOnce
    smtp:
      existingSecret: vaultwarden-smtp
      host: smtp.fastmail.com
      port: 465
      security: force_tls
      from: alacaba@fastmail.com
      username:
        existingSecretKey: SMTP_USERNAME
      password:
        existingSecretKey: SMTP_PASSWORD
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
