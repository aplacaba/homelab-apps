apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: excalidraw
  namespace: excalidraw
spec:
  interval: 1h
  chart:
    spec:
      chart: excalidraw
      version: "0.18.x"
      sourceRef:
        kind: HelmRepository
        name: excalidraw
        namespace: flux-system
  values:
    excalidraw:
      ingress:
        enabled: true
        className: traefik
        host: excalidraw.local
        path: /
    collabServer:
      enabled: false
