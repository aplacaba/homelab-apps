apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authentik-forwardauth
  namespace: traefik
spec:
  forwardAuth:
    # The embedded Authentik outpost endpoint for Traefik forward auth
    address: >-
      http://authentik-server.authentik.svc.cluster.local:80/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    # Headers injected by Authentik on successful auth — passed downstream
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
    # Headers forwarded from the original request to Authentik
    authRequestHeaders:
      - X-Forwarded-Host
      - X-Forwarded-Proto
      - X-Forwarded-For
