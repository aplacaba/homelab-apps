apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authentik-forwardauth
  namespace: traefik
spec:
  forwardAuth:
    # The embedded Authentik outpost endpoint for Traefik forward auth
    address: >-
      http://authentik-server.authentik.svc.cluster.local:80/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    # Headers injected by Authentik on successful auth — passed downstream
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
    # NOTE: do NOT set `authRequestHeaders` here. In Traefik, once you set it,
    # ONLY the listed headers are forwarded to the auth server — which would
    # exclude the `Cookie` header, so the outpost could never see the session
    # cookie and forward-auth would loop forever (re-authenticating each
    # request). Omitting it (the default) forwards ALL request headers,
    # including Cookie. Traefik still sets X-Forwarded-Host/Proto/For itself.
    # This matches the official authentik forward-auth middleware.
