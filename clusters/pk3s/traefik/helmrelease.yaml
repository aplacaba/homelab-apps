apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 1h
  chart:
    spec:
      chart: traefik
      # Pinned to a specific chart version for controlled upgrades.
      version: "40.3.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  values:
    ingressClass:
      enabled: true
      isDefaultClass: true

    # NOTE: the live service was promoted to LoadBalancer (VIPs
    # 192.168.254.50-52) after the original `helm install`, while the stored
    # release values still said NodePort. Pin LoadBalancer here so Flux does
    # NOT revert the service type (which would drop the VIP and break ingress).
    service:
      type: LoadBalancer

    ports:
      web:
        nodePort: 30080
      websecure:
        nodePort: 30443

    providers:
      kubernetesCRD:
        # Lets an IngressRoute reference resources in other namespaces — needed
        # so the paperless IngressRoute can attach the authentik-forwardauth
        # middleware (traefik ns) and route /outpost.goauthentik.io/ to
        # authentik-server (authentik ns).
        allowCrossNamespace: true
