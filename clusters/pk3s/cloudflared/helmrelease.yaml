apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudflared
  namespace: cloudflared
spec:
  interval: 1h
  chart:
    spec:
      chart: cloudflare-tunnel
      version: "0.x"
      sourceRef:
        kind: HelmRepository
        name: cloudflare-tunnel
        namespace: flux-system
  values:
    tunnel:
      name: homelab
      tokenSecret:
        create: false
        name: tunnel-credentials
